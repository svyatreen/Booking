kind = "web"
previewPath = "/"
title = "Hotel Booking App"
version = "1.0.0"
id = "artifacts/hotel-booking"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24960

[services.development]
run = "pnpm --filter frontend run dev"

[services.production]
build = [ "pnpm", "--filter", "frontend", "run", "build" ]
publicDir = "frontend/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24960"
